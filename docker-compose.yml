version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
      POSTGRES_DB: banking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking"]
      interval: 5s
      timeout: 5s
      retries: 5

  products:
    build: .
    ports:
      - "8003:8003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      # VULNERABILITY: Hardcoded JWT secret shared across all services
      JWT_SECRET: supersecret123
      SERVER_PORT: "8003"
      # VULNERABILITY: Hardcoded credit bureau API key also exposed here
      CREDIT_BUREAU_API_KEY: cb_live_4e3f8a2b1c9d7e6f5a4b3c2d1e0f9a8b
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
