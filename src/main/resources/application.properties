spring.datasource.url=jdbc:postgresql://localhost:5432/banking
spring.datasource.username=banking
spring.datasource.password=banking
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jackson.property-naming-strategy=SNAKE_CASE

server.port=8003
jwt.secret=supersecret123

# VULNERABILITY (Actuator Exposure): All Actuator endpoints exposed on the main
# port with no authentication. GET /actuator/env leaks DATABASE_URL, jwt.secret,
# and all other environment variables to any caller.
# Fix: set management.endpoints.web.exposure.include=health,info only, and
#      require authentication via management.endpoint.*.access=UNRESTRICTED only
#      for trusted IPs or admin roles.
management.endpoints.web.exposure.include=*
management.endpoint.env.enabled=true
management.endpoint.env.show-values=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
